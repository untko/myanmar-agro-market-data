name: Scrape & Analyze Market Prices

on:
  schedule:
    # Check after the expected Friday update: 09:30 Myanmar / 10:00 Bangkok.
    # Saturday is the primary run; Sunday and Monday retry delayed updates.
    - cron: '0 3 * * 6,0,1'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper + analyzer
        run: python -m scripts.main 2>&1 | tee scrape_output.log
        id: scrape

      - name: Upload reports and charts
        uses: actions/upload-artifact@v7
        with:
          name: wisarra-analysis-${{ github.run_number }}
          path: |
            artifacts/reports/
            artifacts/charts/
          if-no-files-found: error
          retention-days: 90

      - name: Check for changes
        id: changes
        run: |
          git add ':(glob)data/*/snapshots/**' artifacts/reports/ artifacts/charts/
          if git diff --cached --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No changes detected"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Changes detected"
          fi

      - name: Commit and push
        if: steps.changes.outputs.has_changes == 'true'
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore: weekly price update - ${{ github.run_number }}"
          file_pattern: ":(glob)data/*/snapshots/** artifacts/reports/ artifacts/charts/"
          disable_globbing: true
          commit_user_name: "bot@myanmar-agro-market"
          commit_user_email: "bot@myanmar-agro-market.data"
          commit_author: "Scraper Bot <bot@myanmar-agro-market.data>"
          token: ${{ secrets.PAT_TOKEN }}

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Scrape or analysis failed! Check the logs."
