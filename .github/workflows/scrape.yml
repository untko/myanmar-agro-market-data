name: Scrape & Analyze Market Prices

on:
  schedule:
    # Every Monday at 09:00 UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:  # Allow manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper + analyzer
        run: python scripts/main.py 2>&1 | tee scrape_output.log
        id: scrape

      - name: Parse stats
        id: stats
        run: |
          STATS=$(python scripts/main.py --skip-scrape 2>/dev/null | tail -1)
          echo "result=$STATS" >> $GITHUB_OUTPUT

      - name: Check for changes
        id: changes
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No changes detected"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Changes detected"
          fi

      - name: Commit and push
        if: steps.changes.outputs.has_changes == 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: weekly price update - $(date -u +%Y-%m-%d)"
          file_pattern: "data/"
          commit_user_name: "bot@myanmar-agro-market"
          commit_user_email: "bot@myanmar-agro-market.data"
          commit_author: "Scraper Bot <bot@myanmar-agro-market.data>"
          push_options: ''

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Scrape or analysis failed! Check the logs."
          # Optional: Add webhook/email notification here
